<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth-style.css">
    <style>
        /* Favorites Button Styles */
        .favorite-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .favorite-toggle:hover {
            transform: scale(1.1);
        }

        .heart-icon {
            font-size: 18px;
            color: #ccc;
            transition: color 0.3s ease;
        }

        .favorite-toggle.favorited .heart-icon {
            color: #e74c3c;
        }

        .book-card {
            position: relative;
        }

        /* Modal Favorite Toggle */
        .modal-book-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .modal-favorite-toggle {
            padding: 5px;
            width: 35px;
            height: 35px;
            background-color: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-favorite-toggle:hover {
            background-color: #e0e0e0;
            transform: scale(1.1);
        }

        .modal-favorite-toggle .heart-icon {
            font-size: 20px;
        }

        .modal-favorite-toggle.favorited .heart-icon {
            color: #e74c3c;
        }

        /* Favorites Filter Button */
        .filter-box {
            display: flex;
            gap: 10px;
        }

        .favorites-button {
            padding: 12px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .favorites-button:hover {
            background-color: #2980b9;
        }

        .favorites-button.active {
            background-color: #e74c3c;
        }

        .favorites-button.active:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>Book Explorer</h1>
                <div class="user-menu">
                    <span id="userNameDisplay"></span>
                    <button id="logoutBtn" class="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-filter">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search books by title, author, or subject...">
                <button id="searchButton">Search</button>
            </div>
            <div class="filter-box">
                <select id="sortFilter">
                    <option value="relevance">Sort by Relevance</option>
                    <option value="newest">Sort by Newest</option>
                </select>
                <button id="favoritesToggle" class="favorites-button">My Favorites</button>
            </div>
        </div>

        <div class="books-grid" id="booksGrid">
            <!-- Books will be added here dynamically -->
        </div>

        <div class="pagination">
            <button id="loadMore" class="load-more">Load More Books</button>
        </div>
    </main>

    <!-- Book Detail Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2025 Book Explorer.</p>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
